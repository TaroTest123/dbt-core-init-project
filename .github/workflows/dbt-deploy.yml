name: dbt Deploy

on:
  push:
    branches:
      - development
      - main

jobs:
  dbt-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    env:
      SNOW_TARGET: ${{ github.ref_name == 'main' && 'snowflake_prod' || 'snowflake_dev' }}
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_DATABASE_PROD: ${{ secrets.SNOWFLAKE_DATABASE_PROD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Snowflake config
        run: |
          cat > snowflake-config.toml << 'EOF'
          [connections.default]
          account = "${{ secrets.SNOWFLAKE_ACCOUNT }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          role = "${{ secrets.SNOWFLAKE_ROLE }}"
          warehouse = "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
          database = "${{ secrets.SNOWFLAKE_DATABASE }}"
          schema = "PUBLIC"
          EOF

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0
        with:
          default-config-file-path: snowflake-config.toml

      - name: Deploy dbt project
        run: snow dbt deploy tokyopower_transform --source . --default-target "$SNOW_TARGET" --force --database "$SNOWFLAKE_DATABASE" --schema PUBLIC -x

      - name: Execute dbt build
        run: snow dbt execute tokyopower_transform build --target "$SNOW_TARGET" -x
