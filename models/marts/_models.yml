version: 2

models:
  - name: fct_solar_power
    description: >
      東京電力管内の太陽光発電実績ファクトテーブル。
      5分間隔の記録粒度で、電力需要量・太陽光発電実績・発電比率を保持する。
      分析・ダッシュボード用途の主要テーブル。
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - recorded_date
            - recorded_time
    columns:
      - name: recorded_date
        description: "記録日（TIMESTAMP 型）"
        tests:
          - not_null
      - name: recorded_time
        description: "記録時刻（TIME 型、5分間隔）"
        tests:
          - not_null
      - name: demand_mw
        description: "電力需要量（万kW）"
        tests:
          - not_null
      - name: solar_mw
        description: "太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: solar_ratio_pct
        description: "太陽光発電比率（%、整数）"
        tests:
          - not_null

  - name: fct_solar_power_30min
    description: >
      東京電力管内の太陽光発電実績を30分間隔で集計したファクトテーブル。
      平均・最大・最小の電力メトリクス、エネルギー量（万kWh）、年初来累積エネルギー量を保持する。
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - period_start_at
    columns:
      - name: period_start_at
        description: "30分間隔の期間開始タイムスタンプ"
        tests:
          - not_null
      - name: avg_demand_mw
        description: "平均電力需要量（万kW）"
        tests:
          - not_null
      - name: max_demand_mw
        description: "最大電力需要量（万kW）"
        tests:
          - not_null
      - name: min_demand_mw
        description: "最小電力需要量（万kW）"
        tests:
          - not_null
      - name: avg_solar_mw
        description: "平均太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: max_solar_mw
        description: "最大太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: min_solar_mw
        description: "最小太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: avg_solar_ratio_pct
        description: "平均太陽光発電比率（%）"
        tests:
          - not_null
      - name: demand_energy_mwh
        description: "電力需要量（万kWh、期間内合計）"
        tests:
          - not_null
      - name: solar_energy_mwh
        description: "太陽光発電量（万kWh、期間内合計）"
        tests:
          - not_null
      - name: cumulative_demand_energy_mwh
        description: "電力需要量の年度累計（万kWh、年初来）"
        tests:
          - not_null
      - name: cumulative_solar_energy_mwh
        description: "太陽光発電量の年度累計（万kWh、年初来）"
        tests:
          - not_null
      - name: record_count
        description: "集約元レコード数"
        tests:
          - not_null

  - name: fct_solar_power_hourly
    description: >
      東京電力管内の太陽光発電実績を1時間間隔で集計したファクトテーブル。
      平均・最大・最小の電力メトリクス、エネルギー量（万kWh）、年初来累積エネルギー量を保持する。
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - period_start_at
    columns:
      - name: period_start_at
        description: "1時間間隔の期間開始タイムスタンプ"
        tests:
          - not_null
      - name: avg_demand_mw
        description: "平均電力需要量（万kW）"
        tests:
          - not_null
      - name: max_demand_mw
        description: "最大電力需要量（万kW）"
        tests:
          - not_null
      - name: min_demand_mw
        description: "最小電力需要量（万kW）"
        tests:
          - not_null
      - name: avg_solar_mw
        description: "平均太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: max_solar_mw
        description: "最大太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: min_solar_mw
        description: "最小太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: avg_solar_ratio_pct
        description: "平均太陽光発電比率（%）"
        tests:
          - not_null
      - name: demand_energy_mwh
        description: "電力需要量（万kWh、期間内合計）"
        tests:
          - not_null
      - name: solar_energy_mwh
        description: "太陽光発電量（万kWh、期間内合計）"
        tests:
          - not_null
      - name: cumulative_demand_energy_mwh
        description: "電力需要量の年度累計（万kWh、年初来）"
        tests:
          - not_null
      - name: cumulative_solar_energy_mwh
        description: "太陽光発電量の年度累計（万kWh、年初来）"
        tests:
          - not_null
      - name: record_count
        description: "集約元レコード数"
        tests:
          - not_null

  - name: fct_solar_power_daily
    description: >
      東京電力管内の太陽光発電実績を日次で集計したファクトテーブル。
      平均・最大・最小の電力メトリクス、エネルギー量（万kWh）、年初来累積エネルギー量を保持する。
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - recorded_date
    columns:
      - name: recorded_date
        description: "記録日（DATE 型）"
        tests:
          - not_null
      - name: avg_demand_mw
        description: "平均電力需要量（万kW）"
        tests:
          - not_null
      - name: max_demand_mw
        description: "最大電力需要量（万kW）"
        tests:
          - not_null
      - name: min_demand_mw
        description: "最小電力需要量（万kW）"
        tests:
          - not_null
      - name: avg_solar_mw
        description: "平均太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: max_solar_mw
        description: "最大太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: min_solar_mw
        description: "最小太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: avg_solar_ratio_pct
        description: "平均太陽光発電比率（%）"
        tests:
          - not_null
      - name: demand_energy_mwh
        description: "電力需要量（万kWh、日次合計）"
        tests:
          - not_null
      - name: solar_energy_mwh
        description: "太陽光発電量（万kWh、日次合計）"
        tests:
          - not_null
      - name: cumulative_demand_energy_mwh
        description: "電力需要量の年度累計（万kWh、年初来）"
        tests:
          - not_null
      - name: cumulative_solar_energy_mwh
        description: "太陽光発電量の年度累計（万kWh、年初来）"
        tests:
          - not_null
      - name: record_count
        description: "集約元レコード数"
        tests:
          - not_null

  - name: fct_solar_power_weekly
    description: >
      東京電力管内の太陽光発電実績を週次で集計したファクトテーブル。
      ISO週（月曜始まり）で集計し、平均・最大・最小の電力メトリクス、エネルギー量（万kWh）、年初来累積エネルギー量を保持する。
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - week_start_date
    columns:
      - name: week_start_date
        description: "週の開始日（DATE 型、ISO週の月曜日）"
        tests:
          - not_null
      - name: avg_demand_mw
        description: "平均電力需要量（万kW）"
        tests:
          - not_null
      - name: max_demand_mw
        description: "最大電力需要量（万kW）"
        tests:
          - not_null
      - name: min_demand_mw
        description: "最小電力需要量（万kW）"
        tests:
          - not_null
      - name: avg_solar_mw
        description: "平均太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: max_solar_mw
        description: "最大太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: min_solar_mw
        description: "最小太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: avg_solar_ratio_pct
        description: "平均太陽光発電比率（%）"
        tests:
          - not_null
      - name: demand_energy_mwh
        description: "電力需要量（万kWh、週次合計）"
        tests:
          - not_null
      - name: solar_energy_mwh
        description: "太陽光発電量（万kWh、週次合計）"
        tests:
          - not_null
      - name: cumulative_demand_energy_mwh
        description: "電力需要量の年度累計（万kWh、年初来）"
        tests:
          - not_null
      - name: cumulative_solar_energy_mwh
        description: "太陽光発電量の年度累計（万kWh、年初来）"
        tests:
          - not_null
      - name: record_count
        description: "集約元レコード数"
        tests:
          - not_null

  - name: fct_solar_power_monthly
    description: >
      東京電力管内の太陽光発電実績を月次で集計したファクトテーブル。
      平均・最大・最小の電力メトリクス、エネルギー量（万kWh）、年初来累積エネルギー量を保持する。
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - month_start_date
    columns:
      - name: month_start_date
        description: "月の開始日（DATE 型、各月1日）"
        tests:
          - not_null
      - name: avg_demand_mw
        description: "平均電力需要量（万kW）"
        tests:
          - not_null
      - name: max_demand_mw
        description: "最大電力需要量（万kW）"
        tests:
          - not_null
      - name: min_demand_mw
        description: "最小電力需要量（万kW）"
        tests:
          - not_null
      - name: avg_solar_mw
        description: "平均太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: max_solar_mw
        description: "最大太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: min_solar_mw
        description: "最小太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: avg_solar_ratio_pct
        description: "平均太陽光発電比率（%）"
        tests:
          - not_null
      - name: demand_energy_mwh
        description: "電力需要量（万kWh、月次合計）"
        tests:
          - not_null
      - name: solar_energy_mwh
        description: "太陽光発電量（万kWh、月次合計）"
        tests:
          - not_null
      - name: cumulative_demand_energy_mwh
        description: "電力需要量の年度累計（万kWh、年初来）"
        tests:
          - not_null
      - name: cumulative_solar_energy_mwh
        description: "太陽光発電量の年度累計（万kWh、年初来）"
        tests:
          - not_null
      - name: record_count
        description: "集約元レコード数"
        tests:
          - not_null

  - name: dim_date
    description: >
      日付ディメンションテーブル。
      fct_solar_power_daily から日付を抽出し、年・四半期・月・曜日・季節などの属性を付与する。
      各ファクトテーブルとの結合で季節・曜日分析を可能にする。
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - date_key
    columns:
      - name: date_key
        description: "日付キー（DATE 型）"
        tests:
          - not_null
      - name: year
        description: "年（整数）"
        tests:
          - not_null
      - name: quarter
        description: "四半期（1-4）"
        tests:
          - not_null
      - name: month
        description: "月（1-12）"
        tests:
          - not_null
      - name: month_name
        description: "月名（英語略称: Jan, Feb, ...）"
        tests:
          - not_null
      - name: week_of_year
        description: "年内の週番号（1-53）"
        tests:
          - not_null
      - name: day_of_week
        description: "曜日番号（0=日曜, 6=土曜）"
        tests:
          - not_null
      - name: day_name
        description: "曜日名（英語略称: Mon, Tue, ...）"
        tests:
          - not_null
      - name: is_weekend
        description: "週末フラグ（土日=true）"
        tests:
          - not_null
      - name: season
        description: "季節（春・夏・秋・冬）"
        tests:
          - not_null

  - name: dim_time_of_day
    description: >
      時間帯ディメンションテーブル。
      fct_solar_power_hourly から時間帯を抽出し、時間帯カテゴリ・ピーク時間・太陽光時間の属性を付与する。
      時間帯カテゴリ別の分析軸を提供する。
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - hour_of_day
    columns:
      - name: hour_of_day
        description: "時間（0-23）"
        tests:
          - not_null
      - name: time_slot_label
        description: "時間帯ラベル（早朝/朝/昼/午後/夕方/夜）"
        tests:
          - not_null
      - name: is_peak_hour
        description: "ピーク時間帯フラグ（9-20時=true）"
        tests:
          - not_null
      - name: is_solar_hour
        description: "太陽光発電時間帯フラグ（6-18時=true）"
        tests:
          - not_null

  - name: int_solar_power__daily_profile
    description: >
      日別×時間帯プロファイル中間テーブル。
      fct_solar_power_hourly に dim_date・dim_time_of_day を結合し、
      日付属性（季節・曜日）と時間帯属性（時間帯ラベル・ピーク区分）を付与した時間別データ。
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - recorded_date
            - hour_of_day
    columns:
      - name: recorded_date
        description: "記録日（DATE 型）"
        tests:
          - not_null
      - name: hour_of_day
        description: "時間（0-23）"
        tests:
          - not_null
      - name: season
        description: "季節（春・夏・秋・冬）"
        tests:
          - not_null
      - name: is_weekend
        description: "週末フラグ（土日=true）"
        tests:
          - not_null
      - name: time_slot_label
        description: "時間帯ラベル（早朝/朝/昼/午後/夕方/夜）"
        tests:
          - not_null
      - name: is_peak_hour
        description: "ピーク時間帯フラグ（9-20時=true）"
        tests:
          - not_null
      - name: avg_demand_mw
        description: "平均電力需要量（万kW）"
        tests:
          - not_null
      - name: avg_solar_mw
        description: "平均太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: avg_solar_ratio_pct
        description: "平均太陽光発電比率（%）"
        tests:
          - not_null

  - name: int_solar_power__peak_periods
    description: >
      ピーク時間帯特定中間テーブル。
      fct_solar_power_daily と fct_solar_power_hourly から、
      日別に需要ピーク時刻・太陽光ピーク時刻・最小需要時刻を特定する。
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - recorded_date
    columns:
      - name: recorded_date
        description: "記録日（DATE 型）"
        tests:
          - not_null
      - name: peak_demand_hour
        description: "需要ピーク時刻（0-23）"
        tests:
          - not_null
      - name: peak_demand_mw
        description: "需要ピーク時の平均電力需要量（万kW）"
        tests:
          - not_null
      - name: peak_solar_hour
        description: "太陽光発電ピーク時刻（0-23）"
        tests:
          - not_null
      - name: peak_solar_mw
        description: "太陽光発電ピーク時の平均発電量（万kW）"
        tests:
          - not_null
      - name: min_demand_hour
        description: "最小需要時刻（0-23）"
        tests:
          - not_null
      - name: min_demand_mw
        description: "最小需要時の平均電力需要量（万kW）"
        tests:
          - not_null

  - name: fct_demand_supply_balance
    description: >
      需給バランス分析ファクトテーブル。
      日別の需給ギャップ、太陽光カバー率、ピーク情報を統合し、
      季節・曜日属性を付与した需給バランスの日次分析データ。
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - recorded_date
    columns:
      - name: recorded_date
        description: "記録日（DATE 型）"
        tests:
          - not_null
      - name: season
        description: "季節（春・夏・秋・冬）"
        tests:
          - not_null
      - name: is_weekend
        description: "週末フラグ（土日=true）"
        tests:
          - not_null
      - name: avg_demand_mw
        description: "日平均電力需要量（万kW）"
        tests:
          - not_null
      - name: avg_solar_mw
        description: "日平均太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: demand_energy_mwh
        description: "電力需要量（万kWh、日次合計）"
        tests:
          - not_null
      - name: solar_energy_mwh
        description: "太陽光発電量（万kWh、日次合計）"
        tests:
          - not_null
      - name: solar_coverage_pct
        description: "太陽光カバー率（%、太陽光発電量/需要量×100）"
        tests:
          - not_null
      - name: energy_gap_mwh
        description: "需給ギャップ（万kWh、需要-太陽光）"
        tests:
          - not_null
      - name: peak_demand_hour
        description: "需要ピーク時刻（0-23）"
        tests:
          - not_null
      - name: peak_solar_hour
        description: "太陽光発電ピーク時刻（0-23）"
        tests:
          - not_null
      - name: peak_gap_hours
        description: "需要ピークと太陽光ピークの時刻差（時間）"
        tests:
          - not_null

  - name: fct_solar_power_yoy
    description: >
      年次比較分析ファクトテーブル。
      fct_solar_power_monthly と fct_solar_power_daily から、
      月別の前年同月比較（YoY）を算出する。
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - month_start_date
    columns:
      - name: month_start_date
        description: "月の開始日（DATE 型、各月1日）"
        tests:
          - not_null
      - name: year
        description: "年（整数）"
        tests:
          - not_null
      - name: month
        description: "月（1-12）"
        tests:
          - not_null
      - name: avg_demand_mw
        description: "月平均電力需要量（万kW）"
        tests:
          - not_null
      - name: avg_solar_mw
        description: "月平均太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: solar_energy_mwh
        description: "太陽光発電量（万kWh、月次合計）"
        tests:
          - not_null
      - name: prev_year_solar_energy_mwh
        description: "前年同月の太陽光発電量（万kWh、初年度は NULL）"
      - name: yoy_solar_change_pct
        description: "前年同月比変化率（%、初年度は NULL）"
      - name: avg_daily_record_count
        description: "日平均レコード数（データ品質指標）"
        tests:
          - not_null

  - name: fct_demand_supply_kpi
    description: >
      需給 KPI ファクトテーブル（日次粒度）。
      fct_demand_supply_balance に電気料金単価と CO2 排出係数を結合し、
      推定電気料金・太陽光コスト削減額・系統 CO2 排出量・太陽光 CO2 回避量を算出する。
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - recorded_date
    columns:
      - name: recorded_date
        description: "記録日（DATE 型）"
        tests:
          - not_null
      - name: demand_energy_mwh
        description: "電力需要量（万kWh、日次合計）"
        tests:
          - not_null
      - name: solar_energy_mwh
        description: "太陽光発電量（万kWh、日次合計）"
        tests:
          - not_null
