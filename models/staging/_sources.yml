version: 2

sources:
  - name: sample
    description: "サンプルデータソース (実際の Snowflake スキーマに合わせて変更してください)"
    database: "{{ env_var('SNOWFLAKE_DATABASE') }}"
    schema: raw
    tables:
      - name: orders
        description: "注文データ"
        columns:
          - name: order_id
            description: "注文 ID"
          - name: customer_id
            description: "顧客 ID"
          - name: order_date
            description: "注文日"
          - name: amount
            description: "注文金額"

  - name: tokyopower
    description: "東京電力データソース"
    database: TOKYOPOWER
    schema: PUBLIC
    tables:
      - name: solar_power
        description: "太陽光発電データ"
        loaded_at_field: "to_timestamp(date, 'YYYY/MM/DD')"
        freshness:
          warn_after: {count: 1, period: day}
          error_after: {count: 2, period: day}
