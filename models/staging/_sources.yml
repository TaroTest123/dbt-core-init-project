version: 2

sources:
  - name: tokyopower
    description: "東京電力データソース"
    database: "{% if target.name in ('prod', 'snowflake_prod') %}TOKYOPOWER_PROD{% else %}TOKYOPOWER{% endif %}"
    schema: PUBLIC
    tables:
      - name: solar_power
        description: "太陽光発電データ"
        loaded_at_field: "to_timestamp(date, 'YYYY/MM/DD')"
        freshness:
          warn_after: {count: 1, period: day}
          error_after: {count: 2, period: day}
        columns:
          - name: date
            description: "記録日（TEXT 型、'YYYY/MM/DD' 形式）"
            tests:
              - not_null
          - name: time
            description: "記録時刻（TIME 型、5分間隔）"
          - name: demand
            description: "電力需要量（万kW）"
            tests:
              - not_null
          - name: solar
            description: "太陽光発電実績（万kW）"
            tests:
              - not_null
          - name: solar_ratio
            description: "太陽光発電比率（%、整数）"
