version: 2

models:
  - name: stg_tokyopower__solar_power
    description: >
      東京電力管内の太陽光発電実績データを整形した staging モデル。
      ソーステーブルの TEXT 型日付を TIMESTAMP 型に変換し、
      カラム名をビジネス上わかりやすい名前にリネームしている。
      5分間隔の記録データ。
    columns:
      - name: recorded_date
        description: "記録日（TIMESTAMP 型、ソースの TEXT 型日付から変換）"
        tests:
          - not_null
      - name: recorded_time
        description: "記録時刻（TIME 型、5分間隔）"
        tests:
          - not_null
      - name: demand_mw
        description: "電力需要量（万kW）"
        tests:
          - not_null
      - name: solar_mw
        description: "太陽光発電実績（万kW）"
        tests:
          - not_null
      - name: solar_ratio_pct
        description: "太陽光発電比率（%、整数）"
        tests:
          - not_null
